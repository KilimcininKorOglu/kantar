# Kantar Configuration — Bootstrap Only
# Runtime settings (logging, cache, registries, policies) are managed via
# the database and Web UI after first startup.

[server]
host = "0.0.0.0"
port = 8080
workers = 0

[storage]
type = "filesystem"
path = "/var/lib/kantar/data"

[database]
type = "postgres"

[database.postgres]
host = "postgres"
port = 5432
name = "kantar"
user = "kantar"
password = "${KANTAR_DB_PASSWORD}"
ssl_mode = "disable"

[auth]
type = "local"
