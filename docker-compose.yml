services:
  kantar:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - kantar-data:/var/lib/kantar
      - ./kantar.toml:/etc/kantar/kantar.toml:ro
    environment:
      - KANTAR_DB_PASSWORD=${DB_PASSWORD:-kantar}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=kantar
      - POSTGRES_USER=kantar
      - POSTGRES_PASSWORD=${DB_PASSWORD:-kantar}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kantar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  kantar-data:
  pg-data:
