version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - gofmt
    - revive
    - misspell
    - prealloc
    - unconvert
    - unparam
    - nolintlint
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
        - name: unused-parameter
    misspell:
      locale: US
    govet:
      enable-all: true
      disable:
        - fieldalignment

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
