version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
  settings:
    govet:
      disable:
        - fieldalignment
        - shadow

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
