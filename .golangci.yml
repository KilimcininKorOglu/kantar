version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - nolintlint
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - unnamedResult
        - paramTypeCombine
        - emptyStringTest
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - os.Remove
        - io.Copy
        - fmt.Sscanf
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
        - name: unused-parameter
    misspell:
      locale: US
    govet:
      enable-all: true
      disable:
        - fieldalignment

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-dirs:
    - web/node_modules
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
